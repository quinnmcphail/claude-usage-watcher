name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Test
        run: dotnet test -c Release

      - name: Publish
        run: dotnet publish src/ClaudeUsageWatcher -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o publish

      - name: Derive version from tag
        run: "\"VERSION=$($env:GITHUB_REF_NAME -replace '^v','')\" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$env:VERSION installer\setup.iss'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/ClaudeUsageWatcher-Setup-*.exe
          generate_release_notes: true
