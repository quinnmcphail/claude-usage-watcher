name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Test
        run: dotnet test -c Release

      - name: Publish
        run: dotnet publish src/ClaudeUsageWatcher -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o publish

      - name: Derive version from tag
        run: "\"VERSION=$($env:GITHUB_REF_NAME -replace '^v','')\" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$env:VERSION installer\setup.iss'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/ClaudeUsageWatcher-Setup-*.exe
          generate_release_notes: true

  macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        working-directory: macos
        run: swift test

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build app bundle
        run: APP_VERSION=$VERSION macos/Scripts/make-app.sh

      - name: Zip app bundle
        run: ditto -c -k --keepParent macos/dist/ClaudeUsageWatcher.app "ClaudeUsageWatcher-macOS-$VERSION.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ClaudeUsageWatcher-macOS-${{ env.VERSION }}.zip
          generate_release_notes: true
